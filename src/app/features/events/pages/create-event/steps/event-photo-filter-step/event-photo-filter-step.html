<div class="flex-1 flex flex-col justify-center gap-8">

  <h1 class="font-display text-paper font-light text-2xl text-center">
    ¿Qué <span class="text-ember italic">filtro</span> usarán tus fotos?
  </h1>

  <!-- Large preview -->
  <div
    class="w-full aspect-4/3 rounded-2xl overflow-hidden relative transition-all duration-500"
    [style.filter]="previewFilter()"
  >
    <img ngSrc="/demo-image.jpg" fill class="object-cover" alt="Vista previa del filtro" />
  </div>

  <!-- Filter options -->
  <div class="grid grid-cols-3 gap-3">
    @for (filter of filters; track filter.id) {
      <button [class]="optionClass(filter.id)" (click)="select(filter.id)">
        <div
          class="w-full aspect-square rounded-xl overflow-hidden relative"
          [style.filter]="filter.cssFilter"
        >
          <img ngSrc="/demo-image.jpg" fill class="object-cover" [attr.alt]="filter.label" />
        </div>
        <span [class]="labelClass(filter.id)">{{ filter.label }}</span>
      </button>
    }
  </div>

</div>
