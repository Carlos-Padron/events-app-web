<div class="flex-1 flex flex-col items-center justify-center gap-8">
  <h1 class="font-display text-paper font-light text-2xl text-center">
    ¿Cómo se llama <span class="text-ember italic">este momento</span>?
  </h1>
  <div class="w-full flex flex-col gap-2">
    <app-input
      [formControl]="nameControl"
      [placeholder]="'Boda Sofía & Mateo'"
      [textColor]="'paper'"
      [autocomplete]="'off'"
    />
    <p class="text-sm text-earth">Este nombre aparecerá en el rollo compartido.</p>
  </div>
</div>
