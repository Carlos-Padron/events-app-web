<div class="flex-1 flex flex-col gap-5">
  <h1 class="font-display text-paper font-light text-2xl text-center">
    La <span class="text-ember italic">portada</span> de tu film
  </h1>

  <!-- Cover preview -->
  <div class="flex-1 relative rounded-2xl overflow-hidden">
    <!-- Background: gradient default or uploaded photo -->
    @if (coverUrl()) {
      <img
        [src]="coverUrl()"
        class="absolute inset-0 w-full h-full object-cover"
        alt="Portada del evento"
      />
    } @else {
      <img src="/default-cover.svg" class="absolute inset-0 w-full h-full object-cover" alt="" aria-hidden="true" />
    }

    <!-- Bottom text gradient -->
    <div
      class="absolute inset-x-0 bottom-0 h-2/3 bg-linear-to-t from-black/80 to-transparent"
    ></div>

    <!-- Text content -->
    <div class="absolute inset-x-0 bottom-0 p-6">
      <p class="section-label text-ember mb-3">✦ Reel</p>
      <h2 class="font-display text-4xl text-paper font-light leading-tight">{{ title() }}</h2>
      @if (date()) {
        <p class="text-paper/60 text-sm mt-2">{{ date() }}</p>
      } @else {
        <p class="text-paper/60 text-sm mt-2 italic">Fecha del evento</p>
      }
    </div>
  </div>

  <!-- Upload action -->
  <label class="cursor-pointer">
    <input type="file" accept="image/*" class="sr-only" (change)="onFileSelected($event)" />
    <app-button variant="secondary" size="lg" [fullWidth]="true" class="pointer-events-none">
      {{ coverUrl() ? 'Cambiar foto' : 'Seleccionar foto de portada' }}
    </app-button>
  </label>
</div>
