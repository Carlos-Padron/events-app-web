<div class="flex-1 overflow-y-auto flex flex-col gap-6">

  <!-- Title -->
  <div class="flex flex-col gap-2 text-center">
    <h1 class="font-display text-paper font-light text-2xl">
      ¿Cuándo cierra <span class="text-ember italic">la cámara</span>?
    </h1>
    <p class="text-sm text-paper/40 leading-relaxed">
      Los participantes fotografían desde el inicio del evento hasta este momento. Al llegar esta hora, las fotos se revelan.
    </p>
  </div>

  <!-- Window indicator -->
  @if (eventDateLabel()) {
    <div class="flex items-center gap-2 bg-paper/5 rounded-2xl px-4 py-3 border border-paper/10">
      <div class="flex flex-col items-center gap-0.5 flex-1 text-center">
        <span class="text-[10px] uppercase tracking-widest text-paper/40">Apertura</span>
        <span class="text-sm font-display text-paper font-medium capitalize">{{ eventDateLabel() }}</span>
      </div>
      <i class="ph ph-arrow-right text-paper/30 flex-shrink-0"></i>
      <div class="flex flex-col items-center gap-0.5 flex-1 text-center">
        <span class="text-[10px] uppercase tracking-widest text-paper/40">Cierre</span>
        <span class="text-sm font-display font-medium capitalize" [class]="draft.revealDate() ? 'text-ember' : 'text-paper/30'">
          {{ revealDateLabel() ?? '—' }}
        </span>
      </div>
    </div>
  }

  <!-- Calendar -->
  <app-calendar
    [minDate]="draft.date()"
    [timeLabel]="'Hora de cierre'"
    [value]="draft.revealDate()"
    (valueChange)="draft.revealDate.set($event)"
  />

</div>
