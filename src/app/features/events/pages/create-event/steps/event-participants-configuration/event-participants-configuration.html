<div class="flex-1 flex flex-col gap-8">

  <!-- Title -->
  <h1 class="font-display text-paper font-light text-2xl leading-snug text-center">
    ¿Cuántos invitados<br>para tu <span class="text-ember italic">film</span>?
  </h1>

  <!-- Participant limit -->
  <div>
    <div class="flex items-center gap-3 mb-3">
      <span class="text-xs font-display uppercase tracking-widest text-paper/40">Participantes</span>
      <div class="flex-1 h-px bg-paper/10"></div>
    </div>
    <div class="flex gap-2">
      @for (option of limitOptions; track option.value) {
        <button [class]="limitPillClass(option.value)" (click)="selectLimit(option.value)">
          {{ option.label }}
        </button>
      }
    </div>
  </div>

  <!-- Shots per person -->
  <div>
    <div class="flex items-center gap-3 mb-3">
      <span class="text-xs font-display uppercase tracking-widest text-paper/40">Tiros por persona</span>
      <div class="flex-1 h-px bg-paper/10"></div>
    </div>
    <div class="flex gap-2">
      @for (option of shotOptions; track option.value) {
        <button [class]="shotPillClass(option.value)" (click)="selectShots(option.value)">
          {{ option.label }}
        </button>
      }
    </div>
  </div>

</div>
