<div class="flex-1 flex flex-col justify-center gap-8 px-6">

  <div class="flex flex-col gap-2">
    <h1 class="font-display text-paper font-light text-2xl text-center">
      ¿Cuándo es <span class="text-ember italic">el evento</span>?
    </h1>
    <p class="text-sm text-earth text-center">La cámara abre automáticamente a esta hora.</p>
  </div>

  <app-calendar
    [value]="selectedDate()"
    (valueChange)="onDateSelected($event)"
  />

</div>
