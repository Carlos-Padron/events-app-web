<div class="flex-1 overflow-y-auto flex flex-col bg-ink px-6 py-10">

  <!-- Brand -->
  <div class="flex flex-col pb-10">
    <p class="section-label text-ember mb-4">✦ Reel</p>
    <h1 class="font-display text-5xl font-light text-paper leading-tight">
      Tu día,<br>
      <em class="italic text-ember">tu film.</em>
    </h1>
    <p class="text-earth text-sm mt-3">Captura cada momento. Revélalo juntos.</p>
  </div>

  <!-- Form -->
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5" novalidate>

    <app-input
      formControlName="email"
      [label]="'Correo electrónico'"
      [placeholder]="'tu@correo.com'"
      [autocomplete]="'email'"
      [textColor]="'paper'"
      [error]="emailError"
    />

    <app-input
      formControlName="password"
      [type]="'password'"
      [label]="'Contraseña'"
      [placeholder]="'••••••••'"
      [autocomplete]="'current-password'"
      [textColor]="'paper'"
      [error]="passwordError"
    />

    <div class="flex flex-col gap-3 mt-2">
      <app-button
        [type]="'submit'"
        variant="accent"
        size="lg"
        [fullWidth]="true"
        [disabled]="isLoading()"
      >
        @if (isLoading()) {
          <app-spinner size="sm" />
        }
        Iniciar sesión
      </app-button>

      <app-divider text="O" />

      <app-button
        variant="secondary"
        size="lg"
        [fullWidth]="true"
        [disabled]="isLoading()"
      >
        Crear cuenta
      </app-button>
    </div>

  </form>

</div>
